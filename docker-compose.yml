services:
  web:
    build:
      context: .
      network: host
    ports:
      - "3000:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: postgres://crm:crm_dev@db:5432/hmd_crm
    depends_on:
      - db

  db:
    image: postgres:17-alpine
    container_name: hmd-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm_dev
      POSTGRES_DB: hmd_crm
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
